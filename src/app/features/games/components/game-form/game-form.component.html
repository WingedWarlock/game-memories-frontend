<form [formGroup]="form" (ngSubmit)="submit()">
  <div class="field-row">
    <div class="field">
      <label for="game-title">Título *</label>
      <input id="game-title" type="text" formControlName="title" placeholder="Ex: Kingdom Hearts" />
      @if (form.controls.title.invalid && form.controls.title.touched) {
        <span class="field-error">Informe o título do jogo.</span>
      }
    </div>
    <div class="field">
      <label for="game-platform">Plataforma *</label>
      <input id="game-platform" type="text" formControlName="platform" placeholder="Ex: PS2, PC, Switch" />
      @if (form.controls.platform.invalid && form.controls.platform.touched) {
        <span class="field-error">Informe a plataforma.</span>
      }
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label for="game-saga">Saga</label>
      <input id="game-saga" type="text" formControlName="saga" placeholder="Ex: Kingdom Hearts" />
    </div>
    <div class="field">
      <label for="game-genre">Gênero</label>
      <input id="game-genre" type="text" formControlName="genre" placeholder="Ex: RPG, Ação" />
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label for="game-status">Status *</label>
      <select id="game-status" formControlName="status">
        @for (option of statusOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>
    <div class="field">
      <label for="game-rating">O quanto eu gostei</label>
      <select id="game-rating" formControlName="rating">
        <option [value]="null">Sem avaliação</option>
        @for (option of ratingOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
      @if (ratingHint()) {
        <span class="field-hint">{{ ratingHint() }}</span>
      }
    </div>
  </div>

  <div class="field">
    <label for="game-description">Descrição</label>
    <textarea id="game-description" formControlName="description" rows="3" placeholder="Sinopse ou informações gerais sobre o jogo"></textarea>
  </div>

  <div class="field">
    <label for="game-notes">Anotações pessoais</label>
    <textarea id="game-notes" formControlName="notes" rows="3" placeholder="Suas anotações sobre esse jogo"></textarea>
  </div>

  <div class="checkbox-field field">
    <input id="game-favorite" type="checkbox" formControlName="favorite" />
    <label for="game-favorite">Marcar como favorito</label>
  </div>

  <div class="checkbox-field field">
    <input id="game-hundred-percent" type="checkbox" formControlName="myHundredPercent" />
    <label for="game-hundred-percent">Meu 100%</label>
    <span class="crown-icon" title="Meu 100%">
      <app-icon name="crown" [size]="16" />
    </span>
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn-secondary" (click)="cancelled.emit()">Cancelar</button>
    <button type="submit" class="btn btn-primary">{{ isEditMode() ? 'Salvar alterações' : 'Criar Game' }}</button>
  </div>
</form>
